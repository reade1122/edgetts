/** Subject 內 Base64 過長時略過解析，避免 iPad／Safari 記憶體暴衝 */
const PDF_MARKS_SUBJECT_B64_MAX_LEN_INDEX2 = 240000;

// 從PDF文件載入標記（從PDF元數據中讀取）
async function loadMarksFromPdf() {
    try {
        if (!originalPdfBytes) {
            console.warn('originalPdfBytes 未設置，無法載入標記');
            marks = {};
            return;
        }
        
        if (typeof PDFLib === 'undefined') {
            console.warn('PDFLib 未載入，等待載入...');
            // 等待 PDFLib 載入
            let retryCount = 0;
            const maxRetries = 50; // 最多等待5秒
            const checkPDFLib = setInterval(() => {
                retryCount++;
                if (typeof PDFLib !== 'undefined') {
                    clearInterval(checkPDFLib);
                    loadMarksFromPdf(); // 重新調用
                } else if (retryCount >= maxRetries) {
                    clearInterval(checkPDFLib);
                    console.error('PDFLib 載入超時，無法載入標記');
                    marks = {};
                }
            }, 100);
            return;
        }
        
        console.log('開始從PDF載入標記，originalPdfBytes長度:', originalPdfBytes.length);
        
        const { PDFDocument } = PDFLib;
        const pdfDocLib = await PDFDocument.load(originalPdfBytes);
        
        // 從PDF的Keywords欄位讀取密碼哈希
        // PDF-lib 的 keywords 是陣列格式
        let keywordsArray = pdfDocLib.getKeywords() || [];
        // 確保是陣列格式
        if (typeof keywordsArray === 'string') {
            keywordsArray = keywordsArray ? [keywordsArray] : [];
        } else if (!Array.isArray(keywordsArray)) {
            keywordsArray = [];
        }
        
        // 在陣列中查找密碼標記
        const passwordKeyword = keywordsArray.find(k => k.includes('PDF_MARKS_PASSWORD:'));
        if (passwordKeyword) {
            const passwordMatch = passwordKeyword.match(/PDF_MARKS_PASSWORD:([a-f0-9]{64})/);
            if (passwordMatch) {
                pdfPasswordHash = passwordMatch[1];
                console.log('PDF標記已受密碼保護');
            } else {
                pdfPasswordHash = null;
                currentSessionPassword = null;
            }
        } else {
            pdfPasswordHash = null;
            currentSessionPassword = null;
        }
        
        // 從PDF的Subject欄位讀取標記數據
        const subject = pdfDocLib.getSubject() || '';
        
        console.log('PDF Subject:', subject.substring(0, 50) + '...'); // 只顯示前50個字符
        
        if (subject.startsWith('PDF_MARKS_DATA:')) {
            // 提取標記數據
            const encodedMarks = subject.substring('PDF_MARKS_DATA:'.length);
            if (encodedMarks.length > PDF_MARKS_SUBJECT_B64_MAX_LEN_INDEX2) {
                console.warn(
                    'PDF 標記中繼資料過長（可能為舊版未清乾淨），已略過載入以避免當機；請用電腦「保存標記」一次或另存新檔以縮小 Subject。'
                );
                marks = {};
                markIdCounter = 0;
                setTimeout(() => renderMarks(), 500);
                return;
            }
            try {
                const marksJson = decodeURIComponent(escape(atob(encodedMarks)));
                const parsed = JSON.parse(marksJson);

                if (parsed && parsed.v === 2 && parsed.m === 'layer' && parsed.p) {
                    const expanded = expandCompactMarksLayerV2(parsed);
                    marks = expanded && typeof expanded === 'object' ? expanded : {};
                } else if (parsed && parsed.v === 2 && parsed.m === 'pdf') {
                    console.warn(
                        '此 PDF 標記為「PDF.js 檢視器」專用格式，請以 index 開啟；index2 無法載入該標記。'
                    );
                    marks = {};
                } else {
                    marks = parsed && typeof parsed === 'object' ? parsed : {};
                    Object.keys(marks).forEach(pageNum => {
                        if (Array.isArray(marks[pageNum])) {
                            marks[pageNum].forEach(mark => {
                                if (mark && typeof mark === 'object') mark.text = '';
                            });
                        }
                    });
                }

                // 確保每個標記都有 replacementText 和 locked 字段（向後兼容）
                Object.keys(marks).forEach(pageNum => {
                    if (Array.isArray(marks[pageNum])) {
                        marks[pageNum].forEach(mark => {
                            if (!mark.hasOwnProperty('replacementText')) {
                                mark.replacementText = '';
                            }
                            if (!mark.hasOwnProperty('locked')) {
                                mark.locked = false;
                            }
                        });
                    }
                });

                const allLoaded = Object.values(marks).flat();
                markIdCounter = allLoaded.length ? Math.max(...allLoaded.map(m => m.id)) + 1 : 0;

                console.log('從PDF文件載入標記數據成功，標記數量:', Object.keys(marks).length);
                
                // 標記數據已載入，但不自動顯示標記和編輯按鈕
                // 只有進入編輯模式時才顯示標記和編輯功能
                console.log('標記數據已載入，等待進入編輯模式後顯示');
                
                // 延遲渲染標記（但標記會隱藏，直到進入編輯模式）
                setTimeout(() => {
                    renderMarks();
                }, 500);
            } catch (parseError) {
                console.error('解析PDF中的標記數據失敗:', parseError);
                console.error('編碼的標記數據:', encodedMarks.substring(0, 100));
                // PDF中沒有標記數據或解析失敗，標記為空
                marks = {};
            }
        } else {
            // PDF中沒有標記數據，標記為空
            console.log('PDF中沒有標記數據');
            marks = {};
        }
    } catch (error) {
        console.error('從PDF載入標記失敗:', error);
        console.error('錯誤詳情:', error.stack);
        // 載入失敗，標記為空
        marks = {};
    }
}

/** index2 寫入 PDF：v2 + m:layer，列為 [id, nx, ny, nw, nh, 替換字?, 1?]（與 PDF.js viewer 的 pdf 座標格式不同） */
const MARKS_INDEX2_REP_MAX = 600;

function roundNorm4Mark(n) {
    if (typeof n !== 'number' || !isFinite(n)) return 0;
    return Math.round(n * 10000) / 10000;
}

async function getScaledViewportSizeIndex2(pageNum) {
    if (!pdfDoc) return { width: 1, height: 1 };
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale: 1 });
    const desiredWidth = window.innerWidth * 0.95;
    const scale = desiredWidth / viewport.width;
    const scaledViewport = page.getViewport({ scale });
    return { width: scaledViewport.width, height: scaledViewport.height };
}

async function serializeMarksLayerPayload() {
    const p = {};
    const keys = Object.keys(marks);
    for (let i = 0; i < keys.length; i++) {
        const pageKey = keys[i];
        const list = marks[pageKey];
        if (!Array.isArray(list) || !list.length) continue;
        const pageNum = parseInt(pageKey, 10) || 1;
        const vp = await getScaledViewportSizeIndex2(pageNum);
        const fakeLayer = { clientWidth: vp.width || 1, clientHeight: vp.height || 1 };
        const rows = [];
        for (let j = 0; j < list.length; j++) {
            const m = list[j];
            const complete =
                m.anchorNorm &&
                typeof m.anchorNorm.nx === 'number' &&
                typeof m.anchorNorm.ny === 'number' &&
                typeof m.anchorNorm.nw === 'number' &&
                typeof m.anchorNorm.nh === 'number';
            if (!complete) {
                writeMarkAnchorNormFromPixels(m, fakeLayer);
            }
            const an = m.anchorNorm;
            if (!an) continue;
            const row = [
                m.id,
                roundNorm4Mark(an.nx),
                roundNorm4Mark(an.ny),
                roundNorm4Mark(an.nw),
                roundNorm4Mark(an.nh),
            ];
            const rep = (m.replacementText || '').trim();
            if (rep) {
                row.push(rep.length > MARKS_INDEX2_REP_MAX ? rep.slice(0, MARKS_INDEX2_REP_MAX) : rep);
            }
            if (m.locked) row.push(1);
            rows.push(row);
        }
        if (rows.length) p[pageKey] = rows;
    }
    return { v: 2, m: 'layer', p };
}

function expandCompactMarksLayerV2(obj) {
    if (!obj || obj.v !== 2 || obj.m !== 'layer' || !obj.p || typeof obj.p !== 'object') return null;
    const out = {};
    Object.keys(obj.p).forEach(pageKey => {
        const rows = obj.p[pageKey];
        if (!Array.isArray(rows)) return;
        out[pageKey] = rows
            .map(row => {
                if (!Array.isArray(row) || row.length < 5) return null;
                const id = row[0];
                const nx = row[1];
                const ny = row[2];
                const nw = row[3];
                const nh = row[4];
                let replacementText = '';
                let locked = false;
                if (row.length > 5) {
                    if (typeof row[5] === 'string') {
                        replacementText = row[5];
                        if (row.length > 6 && row[6] === 1) locked = true;
                    } else if (row[5] === 1) {
                        locked = true;
                    }
                }
                return {
                    id,
                    anchorNorm: { nx, ny, nw, nh },
                    x: 0,
                    y: 0,
                    width: 0,
                    height: 0,
                    text: '',
                    replacementText,
                    locked,
                };
            })
            .filter(Boolean);
    });
    return out;
}

// ---------- 標記與版面縮放對齊（anchorNorm：相對標記層／文字層之比例 0–1）----------
function clampMarkAnchor01(v) {
    if (typeof v !== 'number' || !isFinite(v)) return 0;
    return Math.max(0, Math.min(1, v));
}

/** 依目前像素寫入 anchorNorm（儲存至 PDF JSON 後可跨裝置還原） */
function writeMarkAnchorNormFromPixels(mark, markLayerEl) {
    if (!mark || !markLayerEl) return;
    const lw = markLayerEl.clientWidth || 1;
    const lh = markLayerEl.clientHeight || 1;
    mark.anchorNorm = {
        nx: clampMarkAnchor01(mark.x / lw),
        ny: clampMarkAnchor01(mark.y / lh),
        nw: clampMarkAnchor01(mark.width / lw),
        nh: clampMarkAnchor01(mark.height / lh)
    };
}

/** 若有 anchorNorm 則依目前標記層寬高回寫 x/y/width/height；否則由像素補上 anchorNorm */
function ensureMarkAnchorSynced(mark, markLayerEl) {
    if (!mark || !markLayerEl) return;
    const lw = markLayerEl.clientWidth || 1;
    const lh = markLayerEl.clientHeight || 1;
    const an = mark.anchorNorm;
    if (an && typeof an.nx === 'number' && typeof an.ny === 'number' &&
        typeof an.nw === 'number' && typeof an.nh === 'number') {
        mark.x = an.nx * lw;
        mark.y = an.ny * lh;
        mark.width = an.nw * lw;
        mark.height = an.nh * lh;
    } else {
        writeMarkAnchorNormFromPixels(mark, markLayerEl);
    }
}

function clearPdfMarkAnchorsInTextLayer(pageNum) {
    const markLayer = document.querySelector(`.mark-layer[data-page-num="${pageNum}"]`);
    if (!markLayer) return;
    const pdfViewer = markLayer.parentElement;
    const textLayer = pdfViewer && pdfViewer.querySelector('.textLayer');
    if (!textLayer) return;
    textLayer.querySelectorAll('span.pdf-mark-tl-anchor').forEach((el) => el.remove());
}

/** 在文字層插入與標記框同比例的不可見錨點（供對齊／除錯；重繪前會清除） */
function injectPdfMarkAnchorsInTextLayer(pageNum) {
    clearPdfMarkAnchorsInTextLayer(pageNum);
    const markLayer = document.querySelector(`.mark-layer[data-page-num="${pageNum}"]`);
    if (!markLayer) return;
    const pdfViewer = markLayer.parentElement;
    const textLayer = pdfViewer && pdfViewer.querySelector('.textLayer');
    if (!textLayer) return;
    const list = marks[pageNum];
    if (!Array.isArray(list) || list.length === 0) return;
    list.forEach((mark) => {
        ensureMarkAnchorSynced(mark, markLayer);
        const an = mark.anchorNorm;
        if (!an) return;
        const span = document.createElement('span');
        span.className = 'pdf-mark-tl-anchor';
        span.setAttribute('data-pdf-mark-id', String(mark.id));
        span.setAttribute('aria-hidden', 'true');
        span.style.cssText = [
            'position:absolute',
            'box-sizing:border-box',
            `left:${an.nx * 100}%`,
            `top:${an.ny * 100}%`,
            `width:${an.nw * 100}%`,
            `height:${an.nh * 100}%`,
            'opacity:0',
            'pointer-events:none',
            'overflow:hidden',
            'z-index:-1'
        ].join(';');
        textLayer.appendChild(span);
    });
}

// 渲染標記
function renderMarks() {
    if (!marks[currentPage] || marks[currentPage].length === 0) {
        // 清除標記層內容
        const markLayer = document.querySelector(`.mark-layer[data-page-num="${currentPage}"]`);
        if (markLayer) {
            markLayer.innerHTML = '';
        }
        clearPdfMarkAnchorsInTextLayer(currentPage);
        return;
    }
    
    const markLayer = document.querySelector(`.mark-layer[data-page-num="${currentPage}"]`);
    if (!markLayer) {
        console.warn('標記層不存在，頁碼:', currentPage);
        return;
    }
    
    // 檢查是否有標記正在被拖拽或調整大小
    // 如果有，則跳過重新渲染，避免中斷用戶操作
    const activeMarkBlocks = markLayer.querySelectorAll('.mark-block.dragging');
    if (activeMarkBlocks.length > 0) {
        console.log('檢測到正在操作的標記，跳過重新渲染以避免中斷操作');
        return;
    }
    
    // 清除舊的標記
    markLayer.innerHTML = '';
    
    marks[currentPage].forEach(mark => {
        ensureMarkAnchorSynced(mark, markLayer);
        // 驗證標記數據
        if (!mark || typeof mark.x !== 'number' || typeof mark.y !== 'number' || 
            typeof mark.width !== 'number' || typeof mark.height !== 'number') {
            console.warn('無效的標記數據:', mark);
            return;
        }
        
        // 確保標記尺寸合理
        if (mark.width <= 0 || mark.height <= 0) {
            console.warn('標記尺寸無效:', mark);
            return;
        }
        
        const markBlock = document.createElement('div');
        markBlock.className = 'mark-block';
        markBlock.dataset.markId = mark.id;
        markBlock.style.position = 'absolute';
        markBlock.style.left = `${mark.x}px`;
        markBlock.style.top = `${mark.y}px`;
        markBlock.style.width = `${mark.width}px`;
        markBlock.style.height = `${mark.height}px`;
        markBlock.style.display = 'block';
        markBlock.style.visibility = 'visible';
        
        const label = document.createElement('div');
        label.className = 'mark-label';
        label.textContent = `區塊 ${mark.id + 1}`;
        markBlock.appendChild(label);
        
        // 確保 locked 屬性存在（向後兼容）
        if (mark.locked === undefined) {
            mark.locked = false;
        }
        
        // 如果鎖定，添加 locked class
        if (mark.locked) {
            markBlock.classList.add('locked');
        }
        
        // 創建工具欄容器
        const toolbar = document.createElement('div');
        toolbar.className = 'mark-toolbar';
        
        // 如果標記框寬度不足（小於 80px），工具欄顯示在外部
        if (mark.width < 80) {
            toolbar.classList.add('small-box');
        }
        
        // 添加鎖頭按鈕
        const lockBtn = document.createElement('div');
        lockBtn.className = 'mark-lock';
        lockBtn.textContent = mark.locked ? '🔒' : '🔓';
        lockBtn.title = mark.locked ? '解鎖標記（解鎖後可移動、調整和刪除）' : '鎖定標記（鎖定後不可移動、調整和刪除）';
        if (mark.locked) {
            lockBtn.classList.add('locked');
        }
        
        // 使用標記防止重複觸發
        let isLockHandling = false;
        
        const handleLock = async (e) => {
            // 防止重複觸發
            if (isLockHandling) {
                return false;
            }
            
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            
            isLockHandling = true;
            
            // 確保 mark 對象存在
            const currentMarkData = marks[currentPage].find(m => m.id === mark.id);
            if (!currentMarkData) {
                console.error('找不到標記數據:', mark.id);
                isLockHandling = false;
                return false;
            }
            
            // 切換鎖定狀態
            currentMarkData.locked = !currentMarkData.locked;
            mark.locked = currentMarkData.locked; // 同步更新閉包中的 mark
            
            console.log('切換鎖定狀態，標記ID:', mark.id, '新狀態:', currentMarkData.locked);
            
            // 立即更新標記框狀態
            if (currentMarkData.locked) {
                markBlock.classList.add('locked');
                lockBtn.textContent = '🔒';
                lockBtn.classList.add('locked');
                lockBtn.title = '解鎖標記（解鎖後可移動、調整和刪除）';
            } else {
                markBlock.classList.remove('locked');
                lockBtn.textContent = '🔓';
                lockBtn.classList.remove('locked');
                lockBtn.title = '鎖定標記（鎖定後不可移動、調整和刪除）';
            }
            // 強制瀏覽器立即重繪，讓鎖頭圖示馬上顯示（避免已上鎖但圖示延遲更新）
            void lockBtn.offsetHeight;
            void markBlock.offsetHeight;
            
            // 保存到 PDF（異步執行，不阻塞 UI 更新）
            saveMarksToPdf(false).catch(err => {
                console.error('保存鎖定狀態失敗:', err);
            }).finally(() => {
                // 延遲重置標記，確保所有事件都處理完
                setTimeout(() => {
                    isLockHandling = false;
                }, 100);
            });
            
            return false;
        };
        
        // 只使用 click 事件，避免 mousedown 和 click 重複觸發
        lockBtn.addEventListener('click', handleLock);
        toolbar.appendChild(lockBtn);
        
        // 添加編輯按鈕
        const editBtn = document.createElement('div');
        editBtn.className = 'mark-edit';
        editBtn.textContent = '✎';
        editBtn.title = '編輯替換文字';
        
        const handleEdit = (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            editMarkReplacementText(mark.id, currentPage);
            return false;
        };
        
        editBtn.addEventListener('click', handleEdit);
        toolbar.appendChild(editBtn);
        
        // 添加刪除按鈕
        const deleteBtn = document.createElement('div');
        deleteBtn.className = 'mark-delete';
        deleteBtn.textContent = '×';
        deleteBtn.title = '刪除此標記';
        
        // 使用 click 事件
        deleteBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            // 如果標記已鎖定，不允許刪除
            if (mark.locked) {
                Swal.fire({
                    icon: 'warning',
                    title: '無法刪除',
                    text: '標記已鎖定，請先解鎖後再刪除',
                    timer: 2000,
                    showConfirmButton: false,
                    customClass: {
                        popup: 'swal-high-z-index'
                    }
                });
                return false;
            }
            console.log('刪除按鈕被點擊，標記ID:', mark.id);
            await deleteMarkBlock(mark.id, currentPage);
            return false;
        });
        
        toolbar.appendChild(deleteBtn);
        
        // 將工具欄添加到標記框
        markBlock.appendChild(toolbar);
        
        // 在編輯模式下添加調整大小的控制點和拖拽功能
        if (isMarkingMode) {
            // 添加調整大小的控制點（8個方向）
            const resizeHandles = ['nw', 'n', 'ne', 'w', 'e', 'sw', 's', 'se'];
            resizeHandles.forEach(direction => {
                const handle = document.createElement('div');
                handle.className = `resize-handle ${direction}`;
                handle.dataset.direction = direction;
                markBlock.appendChild(handle);
            });
            
            // 拖拽移動功能（使用閉包保存每個標記的狀態）
            const markState = {
                isDragging: false,
                isResizing: false,
                resizeDirection: null,
                startX: 0,
                startY: 0,
                startLeft: 0,
                startTop: 0,
                startWidth: 0,
                startHeight: 0,
                hasMoved: false // 追蹤是否真的移動了
            };
            
            // 定義事件處理器（在拖拽/調整大小開始時才綁定）
            let moveHandler2 = null;
            let endHandler2 = null;
            let escapeHandler2 = null;
            
            // 綁定全局事件的輔助函數
            const bindGlobalEvents2 = () => {
                if (!moveHandler2) {
                    moveHandler2 = (e) => handleMove(e);
                    endHandler2 = (e) => handleEnd(e);
                    escapeHandler2 = (e) => {
                        if (e.key === 'Escape' && (markState.isDragging || markState.isResizing)) {
                            // 恢復到原始位置
                            if (markState.isDragging) {
                                markBlock.style.left = `${markState.startLeft}px`;
                                markBlock.style.top = `${markState.startTop}px`;
                            } else if (markState.isResizing) {
                                markBlock.style.left = `${markState.startLeft}px`;
                                markBlock.style.top = `${markState.startTop}px`;
                                markBlock.style.width = `${markState.startWidth}px`;
                                markBlock.style.height = `${markState.startHeight}px`;
                            }
                            handleEnd(e);
                        }
                    };
                    
                    document.addEventListener('mousemove', moveHandler2);
                    document.addEventListener('touchmove', moveHandler2);
                    document.addEventListener('mouseup', endHandler2);
                    document.addEventListener('touchend', endHandler2);
                    document.addEventListener('keydown', escapeHandler2);
                }
            };
            
            // 處理調整大小
            const handleResizeStart = (e, direction) => {
                // 如果標記已鎖定，不允許調整大小
                if (mark.locked) {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                markState.isResizing = true;
                markState.isDragging = false;
                markState.resizeDirection = direction;
                const rect = markBlock.getBoundingClientRect();
                const markLayerRect = markLayer.getBoundingClientRect();
                markState.startX = (e.touches ? e.touches[0].clientX : e.clientX);
                markState.startY = (e.touches ? e.touches[0].clientY : e.clientY);
                markState.startLeft = rect.left - markLayerRect.left;
                markState.startTop = rect.top - markLayerRect.top;
                markState.startWidth = rect.width;
                markState.startHeight = rect.height;
                markBlock.classList.add('dragging');
                
                // 綁定全局事件
                bindGlobalEvents2();
            };
            
            // 處理拖拽開始
            const handleDragStart = (e) => {
                // 如果標記已鎖定，不允許拖拽
                if (mark.locked) {
                    return;
                }
                // 如果點擊的是控制點、刪除按鈕、編輯按鈕或鎖頭按鈕，不開始拖拽
                if (e.target.classList.contains('resize-handle') ||
                    e.target.classList.contains('mark-delete') ||
                    e.target.classList.contains('mark-edit') ||
                    e.target.classList.contains('mark-lock') ||
                    e.target.closest('.mark-delete') ||
                    e.target.closest('.mark-edit') ||
                    e.target.closest('.mark-lock')) {
                    return;
                }
                e.preventDefault();
                e.stopPropagation();
                markState.isDragging = true;
                markState.isResizing = false;
                markState.hasMoved = false; // 重置移動標記
                const rect = markBlock.getBoundingClientRect();
                const markLayerRect = markLayer.getBoundingClientRect();
                markState.startX = (e.touches ? e.touches[0].clientX : e.clientX);
                markState.startY = (e.touches ? e.touches[0].clientY : e.clientY);
                markState.startLeft = rect.left - markLayerRect.left;
                markState.startTop = rect.top - markLayerRect.top;
                markBlock.classList.add('dragging');
                
                // 綁定全局事件
                bindGlobalEvents2();
            };
            
            // 處理移動/調整大小
            const handleMove = (e) => {
                if (!markState.isDragging && !markState.isResizing) return;
                e.preventDefault();
                e.stopPropagation();
                
                const currentX = (e.touches ? e.touches[0].clientX : e.clientX);
                const currentY = (e.touches ? e.touches[0].clientY : e.clientY);
                const deltaX = currentX - markState.startX;
                const deltaY = currentY - markState.startY;
                
                // 如果移動距離超過閾值（5px），標記為真的移動了
                if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                    markState.hasMoved = true;
                }
                
                if (markState.isResizing && markState.resizeDirection) {
                    // 調整大小
                    let newLeft = markState.startLeft;
                    let newTop = markState.startTop;
                    let newWidth = markState.startWidth;
                    let newHeight = markState.startHeight;
                    
                    if (markState.resizeDirection.includes('n')) {
                        newHeight = Math.max(10, markState.startHeight - deltaY);
                        newTop = markState.startTop + (markState.startHeight - newHeight);
                    }
                    if (markState.resizeDirection.includes('s')) {
                        newHeight = Math.max(10, markState.startHeight + deltaY);
                    }
                    if (markState.resizeDirection.includes('w')) {
                        newWidth = Math.max(10, markState.startWidth - deltaX);
                        newLeft = markState.startLeft + (markState.startWidth - newWidth);
                    }
                    if (markState.resizeDirection.includes('e')) {
                        newWidth = Math.max(10, markState.startWidth + deltaX);
                    }
                    
                    markBlock.style.left = `${newLeft}px`;
                    markBlock.style.top = `${newTop}px`;
                    markBlock.style.width = `${newWidth}px`;
                    markBlock.style.height = `${newHeight}px`;
                } else if (markState.isDragging) {
                    // 移動位置
                    const markLayerRect = markLayer.getBoundingClientRect();
                    const newLeft = markState.startLeft + deltaX;
                    const newTop = markState.startTop + deltaY;
                    
                    // 限制在標記層範圍內
                    const maxLeft = markLayerRect.width - parseFloat(markBlock.style.width);
                    const maxTop = markLayerRect.height - parseFloat(markBlock.style.height);
                    
                    markBlock.style.left = `${Math.max(0, Math.min(newLeft, maxLeft))}px`;
                    markBlock.style.top = `${Math.max(0, Math.min(newTop, maxTop))}px`;
                }
            };
            
            
            // 處理結束
            const handleEnd = async (e) => {
                // 移除事件監聽器（重要：防止事件監聽器殘留）
                if (moveHandler2) {
                    document.removeEventListener('mousemove', moveHandler2);
                    document.removeEventListener('touchmove', moveHandler2);
                }
                if (endHandler2) {
                    document.removeEventListener('mouseup', endHandler2);
                    document.removeEventListener('touchend', endHandler2);
                }
                if (escapeHandler2) {
                    document.removeEventListener('keydown', escapeHandler2);
                }
                
                // 檢查是否真的移動了（通過比較最終位置和起始位置）
                const finalLeft = parseFloat(markBlock.style.left);
                const finalTop = parseFloat(markBlock.style.top);
                const finalWidth = parseFloat(markBlock.style.width);
                const finalHeight = parseFloat(markBlock.style.height);
                const positionChanged = Math.abs(finalLeft - markState.startLeft) > 1 || 
                                       Math.abs(finalTop - markState.startTop) > 1;
                const sizeChanged = Math.abs(finalWidth - markState.startWidth) > 1 || 
                                   Math.abs(finalHeight - markState.startHeight) > 1;
                
                // 記錄是否需要觸發語音（只有在拖拽且沒有移動時）
                let shouldRead = false;
                
                if (markState.isDragging || markState.isResizing) {
                    // 如果移動了位置或調整了大小，更新標記數據
                    if (positionChanged || sizeChanged || markState.hasMoved) {
                        const updatedMark = marks[currentPage].find(m => m.id === mark.id);
                        if (updatedMark) {
                            updatedMark.x = finalLeft;
                            updatedMark.y = finalTop;
                            updatedMark.width = finalWidth;
                            updatedMark.height = finalHeight;
                            writeMarkAnchorNormFromPixels(updatedMark, markLayer);
                            
                            // 如果調整了大小，重新提取文字
                            if (markState.isResizing && sizeChanged) {
                                updatedMark.text = extractTextFromMark(updatedMark, currentPage);
                                console.log('標記大小已調整，重新提取文字:', updatedMark.text);
                            }
                            
                            // 靜默保存（不顯示彈窗）
                            // 等待保存完成後再移除 dragging class，確保不會被重新渲染中斷
                            await saveMarksToPdf(false);
                            injectPdfMarkAnchorsInTextLayer(currentPage);
                        }
                    } else if (markState.isDragging && !markState.isResizing) {
                        // 如果只是拖拽但沒有移動，標記需要觸發語音
                        shouldRead = true;
                    }
                }
                
                markState.isDragging = false;
                markState.isResizing = false;
                markState.resizeDirection = null;
                markState.hasMoved = false; // 重置移動標記
                // 在保存完成後才移除 dragging class，確保保存過程中不會被重新渲染
                markBlock.classList.remove('dragging');
                
                // 清理事件處理器引用
                moveHandler2 = null;
                endHandler2 = null;
                escapeHandler2 = null;
                
                // 如果沒有移動，觸發語音朗讀（在清理完成後）
                // 但不在標記模式下觸發，避免錯誤
                if (shouldRead && !isMarkingMode) {
                    // 設置標記，避免 click 事件重複觸發
                    markBlock.dataset.justHandledDrag = 'true';
                    // 使用 setTimeout 確保所有清理工作完成後再觸發語音
                    setTimeout(() => {
                        readMarkBlock(mark.id, currentPage);
                        // 清除標記
                        setTimeout(() => {
                            delete markBlock.dataset.justHandledDrag;
                        }, 200);
                    }, 100);
                }
            };
            
            // 綁定事件（只在標記區塊上綁定，全局事件在拖拽/調整大小開始時才綁定）
            markBlock.addEventListener('mousedown', handleDragStart);
            markBlock.addEventListener('touchstart', handleDragStart);
            
            // 為每個調整大小控制點綁定事件
            resizeHandles.forEach(direction => {
                const handle = markBlock.querySelector(`.resize-handle.${direction}`);
                if (handle) {
                    handle.addEventListener('mousedown', (e) => handleResizeStart(e, direction));
                    handle.addEventListener('touchstart', (e) => handleResizeStart(e, direction));
                }
            });
        }
        
        // 點擊區塊時朗讀（排除刪除按鈕和編輯按鈕）
        // 無論標記是否可見，都要保留點擊朗讀功能
        // 但不在標記模式下觸發，避免錯誤
        markBlock.addEventListener('click', (e) => {
            // 如果點擊的是刪除按鈕、編輯按鈕、鎖頭按鈕、調整大小控制點或其子元素，不觸發朗讀
            if (e.target.classList.contains('mark-delete') || 
                e.target.closest('.mark-delete') ||
                e.target.classList.contains('mark-edit') || 
                e.target.closest('.mark-edit') ||
                e.target.classList.contains('mark-lock') ||
                e.target.closest('.mark-lock') ||
                e.target.classList.contains('resize-handle')) {
                e.stopPropagation();
                return;
            }
            // 在標記模式下不觸發語音，避免錯誤
            if (isMarkingMode) {
                return;
            }
            // 檢查是否剛剛進行了拖拽或調整大小（避免誤觸發朗讀）
            const wasDragging = markBlock.classList.contains('dragging');
            // 檢查是否剛剛處理過拖拽結束（通過數據屬性）
            const justHandledDrag = markBlock.dataset.justHandledDrag === 'true';
            if (wasDragging || justHandledDrag) {
                // 如果剛剛拖拽過或剛剛處理過拖拽結束，不觸發朗讀
                if (justHandledDrag) {
                    delete markBlock.dataset.justHandledDrag; // 清除標記
                }
                return;
            }
            // 點擊標記區域觸發朗讀（非標記模式下）
            e.stopPropagation();
            readMarkBlock(mark.id, currentPage);
        });
        
        markLayer.appendChild(markBlock);
    });

    injectPdfMarkAnchorsInTextLayer(currentPage);
    
    // 更新最大ID計數器
    const allMarks = Object.values(marks).flat();
    if (allMarks.length > 0) {
        markIdCounter = Math.max(...allMarks.map(m => m.id)) + 1;
    }
    
    // 根據是否在編輯模式來決定標記的可見性
    if (isMarkingMode) {
        // 編輯模式：顯示所有標記
        const markBlocks = markLayer.querySelectorAll('.mark-block');
        markBlocks.forEach(block => {
            block.style.display = 'block';
            block.style.visibility = 'visible';
            block.style.opacity = '1';
            block.style.pointerEvents = 'auto';
            // 恢復邊框和背景色
            block.style.border = '3px solid #007BFF';
            block.style.backgroundColor = 'rgba(0, 123, 255, 0.1)';
            // 顯示標籤、編輯按鈕和刪除按鈕
            const label = block.querySelector('.mark-label');
            const editBtn = block.querySelector('.mark-edit');
            const deleteBtn = block.querySelector('.mark-delete');
            if (label) {
                label.style.display = 'block';
            }
            if (editBtn) {
                editBtn.style.display = 'flex';
            }
            if (deleteBtn) {
                deleteBtn.style.display = 'flex';
            }
            // 顯示調整大小控制點
            const resizeHandles = block.querySelectorAll('.resize-handle');
            resizeHandles.forEach(handle => {
                handle.style.display = 'block';
            });
        });
        markLayer.classList.remove('hidden');
    } else {
        // 非編輯模式：隱藏標記視覺，但保留點擊功能
        const markBlocks = markLayer.querySelectorAll('.mark-block');
        markBlocks.forEach(block => {
            block.style.display = 'block'; // 保留元素以便點擊
            block.style.visibility = 'visible';
            block.style.opacity = '0'; // 視覺上不可見
            block.style.pointerEvents = 'auto'; // 保留點擊功能
            block.style.backgroundColor = 'transparent'; // 確保背景透明
            block.style.border = 'none'; // 隱藏邊框
            // 隱藏標籤和刪除按鈕
            const label = block.querySelector('.mark-label');
            const deleteBtn = block.querySelector('.mark-delete');
            const editBtn = block.querySelector('.mark-edit');
            if (label) label.style.display = 'none';
            if (deleteBtn) deleteBtn.style.display = 'none';
            if (editBtn) editBtn.style.display = 'none';
            // 隱藏調整大小控制點
            const resizeHandles = block.querySelectorAll('.resize-handle');
            resizeHandles.forEach(handle => {
                handle.style.display = 'none';
            });
        });
        markLayer.classList.remove('hidden'); // 標記層需要存在以便點擊
    }
}

// 保存標記到PDF（將標記數據保存到PDF元數據中）
async function saveMarksToPdf(showNotification = true) {
    if (!pdfDoc || !originalPdfBytes) {
        if (showNotification) {
            Swal.fire({
                icon: 'warning',
                title: '無法保存',
                text: '請先載入PDF檔案'
            });
        }
        return;
    }
    
    // 檢查 PDFLib 是否已載入
    if (typeof PDFLib === 'undefined') {
        if (showNotification) {
            Swal.fire({
                icon: 'error',
                title: '庫未載入',
                text: 'PDF-lib 庫尚未載入，請刷新頁面後重試'
            });
        }
        return;
    }
    
    try {
        if (showNotification) {
            Swal.fire({
                title: '正在保存',
                text: '正在將標記保存到PDF...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
        }
        
        const { PDFDocument } = PDFLib;
        const pdfDocLib = await PDFDocument.load(originalPdfBytes);
        
        // 精簡寫入：僅錨點矩形（nx,ny,nw,nh）＋可選替換字／鎖定，不存擷取全文（減輕 iPad 負擔）
        const payload = await serializeMarksLayerPayload();
        const hasAnyMark = Object.keys(payload.p || {}).some(
            pk => Array.isArray(payload.p[pk]) && payload.p[pk].length > 0
        );
        if (hasAnyMark) {
            const marksJson = JSON.stringify(payload);
            const encodedMarks = btoa(unescape(encodeURIComponent(marksJson)));
            pdfDocLib.setSubject(`PDF_MARKS_DATA:${encodedMarks}`);
        } else {
            // 已清除所有標記時清空 Subject，避免檔案內仍留舊版巨大資料
            pdfDocLib.setSubject('');
        }
        
        // 使用已設定的密碼（如果有的話），保持現有的密碼設定
        // PDF-lib 的 keywords 必須是陣列
        let keywordsArray = pdfDocLib.getKeywords() || [];
        // 確保是陣列格式
        if (typeof keywordsArray === 'string') {
            keywordsArray = keywordsArray ? [keywordsArray] : [];
        } else if (!Array.isArray(keywordsArray)) {
            keywordsArray = [];
        }
        
        // 保持現有的密碼設定（如果已設定）
        if (pdfPasswordHash) {
            // 移除舊的密碼標記（如果存在）
            keywordsArray = keywordsArray.filter(k => !k.includes('PDF_MARKS_PASSWORD:'));
            // 添加當前的密碼標記
            keywordsArray.push(`PDF_MARKS_PASSWORD:${pdfPasswordHash}`);
            pdfDocLib.setKeywords(keywordsArray);
        } else {
            // 如果沒有密碼保護，清除密碼標記（如果存在）
            keywordsArray = keywordsArray.filter(k => !k.includes('PDF_MARKS_PASSWORD:'));
            pdfDocLib.setKeywords(keywordsArray);
        }
        
        // 也可以使用自定義屬性（如果PDF-lib支持）
        // 保存更新後的PDF字節
        const pdfBytes = await pdfDocLib.save();
        originalPdfBytes = pdfBytes;
        
        // 更新IndexedDB中的PDF
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const urlParams = new URLSearchParams(window.location.search);
        const fileParam = urlParams.get('file');
        const fileName = fileParam || 'marked_document.pdf';
        const file = new File([blob], fileName, { type: 'application/pdf' });
        await saveFileToIndexedDB(file);
        
        if (showNotification) {
            Swal.fire({
                icon: 'success',
                title: '保存成功',
                text: '標記已保存到PDF文件中，可繼續編輯',
                timer: 1500,
                showConfirmButton: false
            });
        }
        
        // 保存後不隱藏標記，保持可見以便繼續編輯
    } catch (error) {
        console.error('保存標記到PDF失敗:', error);
        if (showNotification) {
            Swal.fire({
                icon: 'error',
                title: '保存失敗',
                text: '無法保存標記到PDF: ' + error.message
            });
        }
    }
}

// 下載包含標記的PDF
async function downloadMarkedPdf() {
    if (!originalPdfBytes) {
        Swal.fire({
            icon: 'warning',
            title: '無法下載',
            text: '請先保存標記到PDF'
        });
        return;
    }
    
    try {
        // 確保標記數據已保存到PDF文件
        await saveMarksToPdf();
        
        // 下載原始PDF（不包含標記框線）
        const blob = new Blob([originalPdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        
        const urlParams = new URLSearchParams(window.location.search);
        const fileParam = urlParams.get('file');
        let fileName = fileParam || 'document.pdf';
        
        // 在檔名後加上「已標示」後綴（如果還沒有）
        if (!fileName.includes('已標示')) {
            const lastDotIndex = fileName.lastIndexOf('.');
            if (lastDotIndex > 0) {
                // 有副檔名，在副檔名前插入「已標示」
                fileName = fileName.substring(0, lastDotIndex) + '_已標示' + fileName.substring(lastDotIndex);
            } else {
                // 沒有副檔名，直接加上「已標示」
                fileName = fileName + '_已標示';
            }
        }
        
        a.download = fileName;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        Swal.fire({
            icon: 'success',
            title: '匯出成功',
            text: 'PDF已匯出到本地（標記數據已保存，重新載入此PDF時會自動恢復標記）',
            timer: 2000,
            showConfirmButton: false
        });
    } catch (error) {
        console.error('匯出PDF失敗:', error);
        Swal.fire({
            icon: 'error',
            title: '匯出失敗',
            text: '無法匯出PDF: ' + error.message
        });
    }
}

// 清除所有標記
async function clearAllMarks() {
    // 不需要再次驗證密碼，因為進入標記模式時已經驗證過了
    Swal.fire({
        icon: 'warning',
        title: '確認清除',
        text: '確定要清除所有標記嗎？',
        showCancelButton: true,
        confirmButtonText: '確定',
        cancelButtonText: '取消'
    }).then(async (result) => {
        if (result.isConfirmed) {
            marks = {};
            markIdCounter = 0;
            const markLayers = document.querySelectorAll('.mark-layer');
            markLayers.forEach(layer => {
                layer.innerHTML = '';
            });
            // 清除標記後，需要保存到PDF以更新PDF文件
            if (typeof PDFLib !== 'undefined' && originalPdfBytes) {
                saveMarksToPdf();
            }
            Swal.fire({
                icon: 'success',
                title: '已清除',
                text: '所有標記已清除',
                timer: 1500,
                showConfirmButton: false
            });
        }
    });
}

// 在PDF載入時保存原始字節
async function saveOriginalPdfBytes(file) {
    try {
        const arrayBuffer = await file.arrayBuffer();
        originalPdfBytes = new Uint8Array(arrayBuffer);
    } catch (error) {
        console.error('保存原始PDF字節失敗:', error);
    }
}

// 添加標記事件監聽器
document.addEventListener('DOMContentLoaded', () => {
    // 等待 PDFLib 載入完成
    const checkPDFLib = setInterval(() => {
        if (typeof PDFLib !== 'undefined') {
            clearInterval(checkPDFLib);
            initMarkingFeature();
            
            // 在標記層上添加標記事件（動態綁定，因為標記層是動態創建的）
            // 標記事件已在創建標記層時綁定
        }
    }, 100);
    
    // 10秒後停止檢查
    setTimeout(() => {
        clearInterval(checkPDFLib);
        if (typeof PDFLib === 'undefined') {
            console.warn('PDFLib 未載入，標記功能可能無法使用');
            // 即使 PDFLib 未載入，也初始化基本功能（標記和朗讀仍可使用）
            initMarkingFeature();
        }
    }, 10000);
});
